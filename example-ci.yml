# usually people put this file at .github/workflows/ci.yml - github automatically discovers workflows in that folder

# purposes of this example include: 
#   1) build succeeds
#   2) static checks pass (specifically: clang-tidy & cppcheck)
#   3) Unit tests pass (here i'm assuming that we're using ctest)

name: CI

on:
  push:
    branches: [ master, dev ]   # let's say that we're using master branch for finalized code, and then dev branch for integration testing, but you want CI for both protected branches
                                    # rn there only exists a master branch tho 
  pull_request:
    branches: [ master, dev ]   # CI runs for any pull requests targeting these branches

jobs:
  build-test:
    # runner here is a github-hosted Ubuntu Linux VM. 
    runs-on: ubuntu-latest

    steps:
      # fetch code at the commit youre testing
      - name: Checkout code
        uses: actions/checkout@v4
        # actions/checkout handles submodules if you pass - with: { submodules: 'recursive' }

      # install whatever system tools we need on teh runner, here are a few popular ones y;all might end up using: 
      # - cmake/ninja: deterministic builds
      # - clang-tidy/cppcheck: static analysis
      # - gcovr: coverage report aggregator (works with GCC --coverage)
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-tidy cppcheck gcovr

      # Configure the project for a *host* Debug build.
      # source at repo root:  -S .
      # out-of-tree build dir: -B build
      # -DCMAKE_EXPORT_COMPILE_COMMANDS=ON emits compile_commands.json, meaning clang-tidy knows ur flags/includes
      # -DCMAKE_BUILD_TYPE=Debug for unit tests, also coverage symbols if youre using them
      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Static analysis
        shell: bash
        run: |
          set -euo pipefail
          cppcheck --error-exitcode=1 --enable=warning,style,performance --inline-suppr src include
          files="$(git ls-files '*.c' '*.cc' '*.cpp' '*.cxx' || true)"
          if [[ -n "${files}" ]]; then
            clang-tidy -p build ${files} --warnings-as-errors=*
          else
            echo "No C/C++ files detected; skipping clang-tidy."
          fi

      # this compiles everything, and if it fails it'll block the pull request
      - name: Build
        run: cmake --build build --config Debug

      # Run unit tests that you registered w/ CTest (enable_testing()/add_test()).
      # --output-on-failure surfaces failing logs directly in the actions UI
      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      # if you're using coverage flags, this is where it'd apply: 
      - name: Coverage
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G "build/**/*.gcda" > /dev/null || compgen -G "build/**/*.gcno" > /dev/null; then
            gcovr -r . --branches --xml -o build/coverage.xml
            gcovr -r . --branches        
          else
            echo "No coverage data found, skipping gcovr :("
          fi

      # upload the build dir so other people on controls + me can fetch artifacts (.a/.so, test logs, coverage.xml).
      # i like this b/c it lets you debug pull request failures w/o reproducing the problem on ur own machine
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build
          if-no-files-found: warn
